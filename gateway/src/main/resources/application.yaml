server:
  port: 8080

spring:
  application:
    name: gateway
  cloud:
    gateway:
      discovery:
        locator:
          enabled: false # Desactivamos el automático para usar solo tus rutas manuales
      routes:
        - id: paciente-ms
          uri: lb://HOSPITALPACIENTE 
          predicates:
            - Path=/api/v1/pacientes/**
          
        - id: doctor-ms
          uri: lb://HOSPITALDOCTOR 
          predicates:
            - Path=/api/v1/doctores/**
          
        - id: atencion-ms
          uri: lb://HOSPITALCITA 
          predicates:
            - Path=/api/v1/atenciones/**

        - id: caja-ms
          uri: lb://CAJA 
          predicates:
            - Path=/api/v1/finanzas/**

        - id: descuentos-ms
          uri: lb://CONFIGURACIONDESCUENTOS
          predicates:
            - Path=/api/v1/descuentos/**
          
        - id: inventario-ms
          uri: lb://INVENTARIO 
          predicates:
            - Path=/api/v1/inventario/**
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/